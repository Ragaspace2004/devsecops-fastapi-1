repos:
  # Universal pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-xml

  # Python linting with Pylint (optional - won't block commits)
  - repo: local
    hooks:
      - id: pylint
        name: pylint (optional)
        entry: python -m pylint
        language: system
        types: [python]
        files: \.py$
        args: ["-rn", "--rcfile=.pylintrc", "--exit-zero"]
        pass_filenames: true
        verbose: true

  - repo: https://github.com/psf/black
    rev: 23.7.0
    hooks:
      - id: black
        types: [python]
        files: \.py$

  # Python security linting with Bandit (BLOCKS commits on security issues)
  - repo: local
    hooks:
      - id: bandit
        name: bandit (security)
        entry: python -m bandit
        language: system
        types: [python]
        files: \.py$
        args: ["-ll"]
        pass_filenames: true

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        args: ["--verbose", "--config=.gitleaks.toml"]
  # Python tests
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
